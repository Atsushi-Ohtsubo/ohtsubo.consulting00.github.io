<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyHamLog QRコード</title>
<style>
  body { font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; background: #f4f6f9; display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; }
  .box { background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,.1); text-align: center; }
  h1 { font-size: 18px; color: #14559e; margin: 0 0 8px; }
  p { font-size: 13px; color: #666; margin: 8px 0 20px; }
  #qrcode { display: inline-block; padding: 16px; background: #fff; }
  .url { font-size: 11px; color: #999; margin-top: 16px; word-break: break-all; max-width: 360px; }
</style>
</head>
<body>
  <div class="box">
    <h1>📻 MyHamLog</h1>
    <p>iPhoneのカメラをかざして読み取ってください</p>
    <div id="qrcode"></div>
    <div class="url">https://atsushi-ohtsubo.github.io/ohtsubo.consulting00.github.io/myhamlog/</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://atsushi-ohtsubo.github.io/ohtsubo.consulting00.github.io/myhamlog/',
      width: 280,
      height: 280,
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
